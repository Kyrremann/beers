name: Fetch check-ins

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC every morning
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - run: go install github.com/kyrremann/unparsd/v4@latest

      - run: |
          unparsd fetch -u kyrremann -o ./checkins/kyrremann
          unparsd fetch -u mk0111   -o ./checkins/marcel
        env:
          UNTAPPD_CLIENT_ID: ${{ secrets.UNTAPPD_CLIENT_ID }}
          UNTAPPD_CLIENT_SECRET: ${{ secrets.UNTAPPD_CLIENT_SECRET }}

      - name: Check for new check-ins
        id: diff
        run: |
          git add checkins/
          if git diff --staged --quiet; then
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate statistics
        if: steps.diff.outputs.new == 'true'
        run: |
          unparsd generate -u ./checkins/kyrremann --username kyrremann
          unparsd generate -u ./checkins/marcel --username marcel

      - name: Commit and push
        if: steps.diff.outputs.new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checkins/ _data/ kyrremann/monthly/ marcel/monthly/
          if git diff --staged --quiet; then
            echo "No new check-ins to commit"
          else
            git commit -m "fetch: new check-ins $(date -u '+%Y-%m-%d')"
            git push
          fi
