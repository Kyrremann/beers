name: Fetch check-ins

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC every morning
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: robinraju/release-downloader@v1.12
        with:
          repository: "kyrremann/unparsd"
          latest: true
          fileName: "unparsd"

      - run: |
          chmod +x unparsd
          ./unparsd fetch -u kyrremann
        env:
          UNTAPPD_CLIENT_ID: ${{ secrets.UNTAPPD_CLIENT_ID }}
          UNTAPPD_CLIENT_SECRET: ${{ secrets.UNTAPPD_CLIENT_SECRET }}

      - name: Check for new check-ins
        id: diff
        run: |
          git add checkins/
          if git diff --staged --quiet; then
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate statistics
        if: steps.diff.outputs.new == 'true'
        run: |
          chmod +x unparsd
          ./unparsd generate -u checkins/

      - name: Commit and push
        if: steps.diff.outputs.new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add checkins/ _data/ _monthly/
          if git diff --staged --quiet; then
            echo "No new check-ins to commit"
          else
            git commit -m "fetch: new check-ins $(date -u '+%Y-%m-%d')"
            git push
          fi
